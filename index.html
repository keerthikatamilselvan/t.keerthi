[9:13 PM, 3/30/2026] keerthika tamilselvan🤍: <!DOCTYPE html>
<html>
<head>
  <title>DOM Tasks</title>
</head>
<body>

<!-- 1. getElementById -->
<div id="header"></div>

<!-- 2. getElementsByClassName -->
<p class="text-item">Paragraph 1</p>
<p class="text-item">Paragraph 2</p>
<p class="text-item">Paragraph 3</p>

<!-- 3. getElementsByTagName -->
<ul>
  <li>Item 1</li>
  <li>Item 2</li>
  <li>Item 3</li>
  <li>Item 4</li>
  <li>Item 5</li>
</ul>

<!-- 4. querySelector -->
<div id="dv"></div>

<!-- 5. querySelectorAll -->
<div id="container">
  <span></span>
  <span></span>
  <span></span>
</div>

<script>

//// 1. getElementById
document.getElementById("header").textContent = "Hello World!";
document.getElementById("header").style.backgroundColor = "lightblue";

//// 2. getElementsByClassName
let items = document.getElementsByClassName("text-item");
for (let i = 0; i < items.length; i++) {
  items[i].style.color = "red";
}

//// 3. getElementsByTagName
let li = document.getElementsByTagName("li");
li[2].textContent = "I am the chosen one";
li[2].style.fontSize = "20px";

//// 4. querySelector
document.querySelector("#dv").innerHTML = '<button id="btn">Click Me</button>';
document.querySelector("#btn").style.backgroundColor = "blue";

//// 5. querySelectorAll
let spans = document.querySelectorAll("#container span");
spans.forEach((s, i) => {
  s.textContent = "Span " + (i + 1);
  s.style.border = "2px solid green";
});

</script>

</body>
</html>
